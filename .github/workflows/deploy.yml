name: Production Deploy

on:
  workflow_dispatch:
    inputs:
      production_url:
        description: "Production Sovereign Worker URL to verify after deploy"
        required: true
        type: string

permissions:
  contents: read

jobs:
  release-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify:foundation
      - run: pnpm verify:migrations
      - run: pnpm scan:secrets
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm smoke:worker-gateway
      - run: pnpm smoke:auth
      - run: pnpm smoke:stripe
      - run: pnpm smoke:product
      - run: pnpm smoke:release
      - run: pnpm build:preview
      - run: git diff --check
      - run: test -z "$(git status --short)"

  deploy-production:
    runs-on: ubuntu-latest
    needs: release-gate
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - name: Deploy Baseline Worker
        run: pnpm --filter @sovereign/baseline-worker deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy Sovereign Worker
        run: pnpm --filter @sovereign/worker deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Verify production health
        run: |
          set -euo pipefail
          base="${{ inputs.production_url }}"
          curl -fsS "$base/health" >/tmp/health.json
          curl -fsS "$base/healthz" >/tmp/healthz.json
          curl -fsS "$base/ready" | tee /tmp/ready.json
          node -e "const fs=require('fs'); const ready=JSON.parse(fs.readFileSync('/tmp/ready.json','utf8')); if (ready.ready !== true) throw new Error('production /ready did not return ready=true')"
